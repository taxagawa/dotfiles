name: Test chezmoi

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install chezmoi
        run: brew install chezmoi

      - name: Initialize chezmoi with test data
        run: |
          mkdir -p ~/.config/chezmoi
          cat > ~/.config/chezmoi/chezmoi.yaml <<EOF
          data:
            name: "Test User"
            email: "test@example.com"
          EOF
          chezmoi init --source="$GITHUB_WORKSPACE"

      - name: Apply dotfiles (skip run scripts)
        run: chezmoi apply --source="$GITHUB_WORKSPACE" --exclude=scripts --force

      - name: Verify key files exist
        run: |
          test -f ~/.zshrc
          test -f ~/.gitconfig
          test -f ~/.gitignore_global
          test -f ~/.tmux.conf
          test -f ~/.config/nvim/init.lua
          test -f ~/.config/nvim/lua/config/options.lua
          test -f ~/.config/nvim/lua/config/keymaps.lua
          test -f ~/.config/nvim/lua/config/lazy.lua
          test -f ~/.config/mise/config.toml
          test -d ~/.zsh
          echo "All files deployed successfully"

      - name: Verify gitconfig contains expected sections
        run: |
          grep -q "\[merge\]" ~/.gitconfig
          grep -q "\[push\]" ~/.gitconfig
          grep -q "Test User" ~/.gitconfig
          echo "gitconfig content verified"

      - name: Verify no drift after apply
        run: chezmoi verify --source="$GITHUB_WORKSPACE" --exclude=scripts
